<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="312" viewBox="0 0 1000 312" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img">
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0AE"/></marker></defs>
<title>adaptive effort escalation</title>
<rect width="1000" height="312" rx="18" fill="#ffffff"/><rect width="1000" height="312" rx="18" fill="none" stroke="#ECECF1"/>
<text x="24" y="42" font-size="18" font-weight="700" fill="#1A1A28">⚙ adaptive effort escalation (failure-signal-driven)</text>
<rect x="44" y="170" width="170" height="60" rx="12" fill="#FDECE7"/>
<text x="129.0" y="200" font-size="17" font-weight="800" fill="#8A2B1A" text-anchor="middle">:low</text>
<text x="129.0" y="216" font-size="11.5" fill="#8A2B1A" text-anchor="middle" opacity="0.85">usual start</text>
<line x1="220" y1="208" x2="250" y2="186" stroke="#9AA0AE" stroke-width="1.5" marker-end="url(#ah)"/>
