<text x="235" y="183" font-size="9.5" fill="#7A7F8C" text-anchor="middle">↑1 step</text>
<rect x="256" y="142" width="170" height="88" rx="12" fill="#F6C9BC"/>
<text x="341.0" y="172" font-size="17" font-weight="800" fill="#8A2B1A" text-anchor="middle">:high</text>
<text x="341.0" y="216" font-size="11.5" fill="#8A2B1A" text-anchor="middle" opacity="0.85">when stuck</text>
<line x1="432" y1="208" x2="462" y2="172" stroke="#9AA0AE" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="447" y="158" font-size="9.5" fill="#7A7F8C" text-anchor="middle">fail signal</text>
<text x="447" y="169" font-size="9.5" fill="#7A7F8C" text-anchor="middle">↑1 step</text>
<rect x="468" y="114" width="170" height="116" rx="12" fill="#EC9A85"/>
<text x="553.0" y="144" font-size="17" font-weight="800" fill="#5A1A0E" text-anchor="middle">:xhigh</text>
<text x="553.0" y="216" font-size="11.5" fill="#5A1A0E" text-anchor="middle" opacity="0.85">still failing</text>
<line x1="644" y1="208" x2="674" y2="158" stroke="#9AA0AE" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="659" y="144" font-size="9.5" fill="#7A7F8C" text-anchor="middle">fail signal</text>
<text x="659" y="155" font-size="9.5" fill="#7A7F8C" text-anchor="middle">↑1 step</text>
<rect x="680" y="86" width="170" height="144" rx="12" fill="#D9583E"/>
<text x="765.0" y="116" font-size="17" font-weight="800" fill="#FFFFFF" text-anchor="middle">:max</text>
<text x="765.0" y="216" font-size="11.5" fill="#FFFFFF" text-anchor="middle" opacity="0.85">last resort</text>
<text x="24" y="272" font-size="12" fill="#1A1A28">✅ raising because it couldn't solve it is valid (broken tests · self-contradiction · critic rejection)   ❌ "raise to be safe" is waste — medium→high: +1–2 pts for ~23× tokens</text>
<text x="24" y="294" font-size="12" fill="#6B6B7B">no minimal (−23-pt drop) · floor at low · Gemini 3.x Pro is a single low ↔ high jump</text>
